<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Alliance Constellation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0a0f1d 0%, #02050b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .interface {
            position: relative;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding: 30px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,210,255,0.3);
        }

        header p {
            color: #6c7d93;
            margin: 0;
            font-size: 1rem;
        }

        .star {
            position: absolute;
            z-index: 3;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
            border: 2px solid #3a7bd5;
            background-size: cover;
            background-position: center;
        }

        .star.birthday-boy {
            width: 75px;
            height: 75px;
            border: 3px solid #ffb703;
            box-shadow: 0 0 25px rgba(255, 183, 3, 0.5);
        }

        .star:hover {
            transform: translate(-50%, -50%) scale(1.15);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
            z-index: 10;
        }

        .star.birthday-boy:hover {
            box-shadow: 0 0 35px rgba(255, 183, 3, 0.8);
        }

        .star-name {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #a1b5cc;
            white-space: nowrap;
            background: rgba(2, 5, 11, 0.7);
            padding: 2px 8px;
            border-radius: 10px;
            pointer-events: none;
            border: 1px solid rgba(58, 123, 213, 0.2);
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 450px;
            background: rgba(10, 20, 38, 0.95);
            border: 1px solid #3a7bd5;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(58, 123, 213, 0.2);
            border-radius: 16px;
            padding: 25px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(58, 123, 213, 0.2);
            padding-bottom: 15px;
        }

        .modal-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            background-size: cover;
        }

        .modal-title h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #00d2ff;
        }

        .modal-title span {
            font-size: 0.8rem;
            color: #6c7d93;
        }

        .modal-text {
            font-size: 1rem;
            line-height: 1.5;
            color: #e2e8f0;
            font-style: italic;
            white-space: pre-wrap;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6c7d93;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #fff;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        footer {
            text-align: center;
            color: #4a5768;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
    </style>
</head>
