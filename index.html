<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Alliance Constellation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0a0f1d 0%, #02050b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 2;
            pointer-events: none; /* Разрешает клики сквозь контейнер */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
        }

        header, footer {
            pointer-events: auto; /* Возвращает кликабельность тексту, если нужно */
        }

        header {
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,210,255,0.3);
        }

        header p {
            color: #6c7d93;
            margin: 0;
            font-size: 1rem;
        }

        #constellation-map {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
        }

        .star {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
            border: 2px solid #3a7bd5;
            background-size: cover;
            background-position: center;
            pointer-events: auto; /* Позволяет кликать по звездам */
        }

        .star.birthday-boy {
            width: 75px;
            height: 75px;
            border: 3px solid #ffb703;
            box-shadow: 0 0 25px rgba(255, 183, 3, 0.5);
        }

        .star:hover {
            transform: translate(-50%, -50%) scale(1.15);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
            z-index: 10;
        }

        .star.birthday-boy:hover {
            box-shadow: 0 0 35px rgba(255, 183, 3, 0.8);
        }

        .star-name {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #a1b5cc;
            white-space: nowrap;
            background: rgba(2, 5, 11, 0.7);
            padding: 2px 8px;
            border-radius: 10px;
            pointer-events: none;
            border: 1px solid rgba(58, 123, 213, 0.2);
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 450px;
            background: rgba(10, 20, 38, 0.95);
            border: 1px solid #3a7bd5;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(58, 123, 213, 0.2);
            border-radius: 16px;
            padding: 25px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(58, 123, 213, 0.2);
            padding-bottom: 15px;
        }

        .modal-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            background-size: cover;
        }

        .modal-title h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #00d2ff;
        }

        .modal-title span {
            font-size: 0.8rem;
            color: #6c7d93;
        }

        .modal-text {
            font-size: 1rem;
            line-height: 1.5;
            color: #e2e8f0;
            font-style: italic;
            white-space: pre-wrap;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #6c7d93;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #fff;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        footer {
            text-align: center;
            color: #4a5768;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <script>
        const PLAYERS_DATA = [
            { 
                name: "Ahool 🎂", 
                role: "The Birthday Boy", 
                text: "Today is your day! Click on any star to read messages from your alliance team.", 
                x: 50, 
                y: 50, 
                isBday: true, 
                img: "https://img.freepik.com/free-photo/cute-cat-autumn-season_23-2151833360.jpg?semt=ais_hybrid&w=740&q=80" 
            },
            { 
                name: "Lillith", 
                role: "R5", 
                text: "It's been an amazing 3 years playing side by side. Thank you for always bringing calm and good vibes into our chats!", 
                x: 25, 
                y: 30, 
                img: "https://cdn.mamazin.com.ua/img/products_pictures/large_20240308235708607722.jpg" 
            },
            { 
                name: "Player_R4", 
                role: "R4 Officer", 
                text: "Happy Birthday, man! Thanks for being a reliable teammate all these years. Glad to be in the same orbit with you.", 
                x: 75, 
                y: 25, 
                img: "https://cdn.mamazin.com.ua/img/products_pictures/large_20240308235708607722.jpg" 
            },
            {     
                name: "Fighter_XYZ", 
                role: "Alliance Member", 
                text: "Happy Birthday! It's always great to chat and hang out after a busy work day. Have an awesome one!", 
                x: 40, 
                y: 75, 
                img: "https://cdn.mamazin.com.ua/img/products_pictures/large_20240308235708607722.jpg" 
            }
        ];
    </script>

    <div id="canvas-container">
        <canvas id="sky"></canvas>
    </div>

    <div id="constellation-map"></div>

    <div class="interface">
        <header>
            <h1>3 Years on the Same Orbit</h1>
            <p>Our shared constellation. Click on any star of our team.</p>
        </header>

        <footer>
            WITH LOVE FROM R4 & ALLIANCE TEAM
        </footer>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div class="modal-header">
            <div class="modal-avatar" id="modal-avatar"></div>
            <div class="modal-title">
                <h3 id="modal-name">Player</h3>
                <span id="modal-role">R4 / Ally</span>
            </div>
        </div>
        <div class="modal-text" id="modal-text">Message...</div>
    </div>

    <script>
        const canvas = document.getElementById('sky');
        const ctx = canvas.getContext('2d');
        let activeLineTarget = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawConstellation();
        }

        window.addEventListener('resize', resizeCanvas);

        function getCoords(player) {
            return {
                x: (player.x / 100) * canvas.width,
                y: (player.y / 100) * canvas.height
            };
        }

        function drawConstellation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const bdayPlayer = PLAYERS_DATA.find(p => p.isBday);
            if (!bdayPlayer) return;
            const bdayCoords = getCoords(bdayPlayer);

            ctx.strokeStyle = 'rgba(58, 123, 213, 0.15)';
            ctx.lineWidth = 1;
            for (let i = 0; i < PLAYERS_DATA.length; i++) {
                for (let j = i + 1; j < PLAYERS_DATA.length; j++) {
                    const p1 = getCoords(PLAYERS_DATA[i]);
                    const p2 = getCoords(PLAYERS_DATA[j]);
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }

            if (activeLineTarget && !activeLineTarget.isBday) {
                const targetCoords = getCoords(activeLineTarget);
                ctx.strokeStyle = '#00d2ff';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00d2ff';
                
                ctx.beginPath();
                ctx.moveTo(bdayCoords.x, bdayCoords.y);
                ctx.lineTo(targetCoords.x, targetCoords.y);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        function createStars() {
            const mapContainer = document.getElementById('constellation-map');
            mapContainer.innerHTML = '';

            PLAYERS_DATA.forEach(player => {
                const star = document.createElement('div');
                star.className = `star ${player.isBday ? 'birthday-boy' : ''}`;
                star.style.left = `${player.x}%`;
                star.style.top = `${player.y}%`;
                star.style.backgroundImage = `url('${player.img}')`;

                const nameTag = document.createElement('div');
                nameTag.className = 'star-name';
                nameTag.innerText = player.name;
                star.appendChild(nameTag);

                star.onclick = () => openModal(player);
                mapContainer.appendChild(star);
            });
        }

        function openModal(player) {
            activeLineTarget = player;
            drawConstellation();

            document.getElementById('modal-name').innerText = player.name;
            document.getElementById('modal-role').innerText = player.role;
            document.getElementById('modal-text').innerText = player.text;
            document.getElementById('modal-avatar').style.backgroundImage = `url('${player.img}')`;

            document.getElementById('modal').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeModal() {
            activeLineTarget = null;
            drawConstellation();
            document.getElementById('modal').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // Запуск рендеринга сразу при загрузке страницы
        window.onload = () => {
            createStars();
            resizeCanvas();
        };
    </script>
</body>
</html>
